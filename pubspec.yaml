name: log_custom_printer
description: A custom log printer for Flutter applications.
version: 2.2.0
repository: https://github.com/saulogatti/log_custom_printer

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  json_annotation: ^4.11.0
  meta: ^1.17.0
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^13.1.0

dev_dependencies:
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
